services:
  - type: web
    name: miysara-frontend
    env: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

  - type: web
    name: miysara-backend-api
    env: node
    plan: starter
    buildCommand: npm ci
    startCommand: node server/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

  - type: postgresql
    name: miysara-db
    plan: starter
    version: 15
