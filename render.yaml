services:
  # ── Express API + static file server ──────────────────────────────────────
  - type: web
    name: miysara-ahmed-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install --include=dev && npm run build && cd server && npm install
    startCommand: node server/index.js
    envVars:
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: NODE_ENV
        value: production
